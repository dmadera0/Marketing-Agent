version: "3.9"

services:
  content-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: buenavistaai-content-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ── Required ─────────────────────────────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # ── Security ─────────────────────────────────────────────────────
      - REVIEW_TOKEN_SECRET=${REVIEW_TOKEN_SECRET:-change-me-in-production}
      # ── Auto-publish: Medium ──────────────────────────────────────────
      - MEDIUM_INTEGRATION_TOKEN=${MEDIUM_INTEGRATION_TOKEN:-}
      - MEDIUM_PUBLICATION_ID=${MEDIUM_PUBLICATION_ID:-}
      # ── Auto-publish: Company Site ────────────────────────────────────
      - SITE_TYPE=${SITE_TYPE:-wordpress}
      - WP_URL=${WP_URL:-}
      - WP_USER=${WP_USER:-}
      - WP_APP_PASSWORD=${WP_APP_PASSWORD:-}
      - SITE_WEBHOOK_URL=${SITE_WEBHOOK_URL:-}
      - SITE_WEBHOOK_SECRET=${SITE_WEBHOOK_SECRET:-}
      # ── LinkedIn ──────────────────────────────────────────────────────
      - LINKEDIN_ACCESS_TOKEN=${LINKEDIN_ACCESS_TOKEN:-}
      - LINKEDIN_PERSON_URN=${LINKEDIN_PERSON_URN:-}
      # ── Twitter / X ───────────────────────────────────────────────────
      - TWITTER_API_KEY=${TWITTER_API_KEY:-}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET:-}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN:-}
      - TWITTER_ACCESS_TOKEN_SECRET=${TWITTER_ACCESS_TOKEN_SECRET:-}
      # ── Facebook & Instagram ──────────────────────────────────────────
      - FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID:-}
      - FACEBOOK_PAGE_TOKEN=${FACEBOOK_PAGE_TOKEN:-}
      - INSTAGRAM_USER_ID=${INSTAGRAM_USER_ID:-}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN:-}
      - INSTAGRAM_IMAGE_URL=${INSTAGRAM_IMAGE_URL:-}
      - BLOG_BASE_URL=${BLOG_BASE_URL:-https://www.buenavistaaisolutions.com/blog}
      # ── Review / draft notifications ─────────────────────────────────
      - REVIEW_EMAIL=${REVIEW_EMAIL}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8000}
      # ── Storage ───────────────────────────────────────────────────────
      - CONTENT_STORE_DIR=/data/content
    volumes:
      - content_data:/data/content
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: nginx reverse proxy for HTTPS on EC2
  nginx:
    image: nginx:alpine
    container_name: buenavistaai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - content-engine
    profiles:
      - production   # Only starts with: docker compose --profile production up

volumes:
  content_data:
    driver: local
